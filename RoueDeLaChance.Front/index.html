<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roue de la chance</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <div id="counters"></div>
  <main>
    <header>
      <h1>Roue de la chance</h1>
    </header>
    <div id="wheel-container">
      <canvas id="wheel"></canvas>
      <div id="pointer" aria-hidden="true">▼</div>
    </div>
    <div id="controls">
      <input type="email" id="emailInput" placeholder="Votre e-mail" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none" required />
      <button id="spinBtn" disabled>Tirer</button>
    </div>
    <div id="result" aria-live="polite"></div>
    <footer id="footer"></footer>
  </main>
  <aside id="history-panel">
    <h2>Journal des tirages</h2>
    <ul id="history-list"></ul>
  </aside>
  <script type="module" src="./js/app.js"></script>
</body>

</html>
